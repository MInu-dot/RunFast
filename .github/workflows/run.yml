name: run agent-pulse skill

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  run:
    name: restore agent-pulse skill
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUN_VERSION: "1.3.5"
      RETRY_ATTEMPTS: "5"

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Skills Vault
        run: bash scripts/retry-command.sh bun x skvlt --help

      - name: Restore agent-pulse skill
        run: bash scripts/retry-command.sh bun x skvlt restore

      - name: Install Agent Pulse CLI
        run: bash scripts/retry-command.sh python -m pip install --disable-pip-version-check agentpulse-cli

      - name: Verify Agent Pulse CLI
        run: agent-pulse --version
