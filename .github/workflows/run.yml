name: run

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: choose job count
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.matrix.outputs.count }}
      jobs: ${{ steps.matrix.outputs.jobs }}
      should_run: ${{ steps.matrix.outputs.should_run }}
    steps:
      - id: matrix
        name: Build random matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            minute="$(date -u +%M)"
            hour="$(date -u +%H)"
            tick=$(( (10#$hour * 60 + 10#$minute) / 5 ))
            if [ $((tick % 10)) -ne 0 ]; then
              echo "Skipping this scheduled tick; active ticks run about every 50 minutes."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "count=0" >> "$GITHUB_OUTPUT"
              echo "jobs=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          count=$((150 + RANDOM % 107))
          jobs="$(seq -s, 1 "$count")"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "jobs=[${jobs}]" >> "$GITHUB_OUTPUT"

  run:
    name: run (${{ matrix.job }}/${{ needs.prepare.outputs.count }})
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BUN_VERSION: "1.3.5"
      RETRY_ATTEMPTS: "5"
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.prepare.outputs.jobs) }}

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - id: setup_bun
        name: Set up Bun
        uses: oven-sh/setup-bun@v2
        continue-on-error: true
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - id: bun_status
        name: Resolve Bun setup status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if command -v bun >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "rate_limited=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.setup_bun.outcome }}" != "failure" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "rate_limited=false" >> "$GITHUB_OUTPUT"
            echo "Bun is unavailable even though setup-bun did not report a failure." >&2
            exit 1
          fi

          case "$(uname -m)" in
            x86_64) bun_arch="x64" ;;
            aarch64|arm64) bun_arch="aarch64" ;;
            *)
              echo "Unsupported architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          api_probe="$(gh api /rate_limit 2>&1 || true)"
          asset_probe="$(
            curl -fsSI \
              "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-${bun_arch}.zip" \
              2>&1 || true
          )"
          probe_output="${api_probe}
          ${asset_probe}"

          if printf '%s\n' "$probe_output" | grep -Eqi 'rate limit|too many requests|429|API rate limit exceeded'; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "rate_limited=true" >> "$GITHUB_OUTPUT"
            echo "Bun setup hit a rate limit; continuing without Bun."
            exit 0
          fi

          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "rate_limited=false" >> "$GITHUB_OUTPUT"
          echo "Bun setup failed for a non-rate-limit reason." >&2
          printf '%s\n' "$probe_output" >&2
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore agent-pulse skill
        if: steps.bun_status.outputs.available == 'true'
        run: bash scripts/retry-command.sh bun x skvlt restore

      - name: Install Agent Pulse CLI
        run: bash scripts/retry-command.sh python -m pip install --disable-pip-version-check agentpulse-cli

      - name: Verify Agent Pulse CLI
        run: agent-pulse --version
